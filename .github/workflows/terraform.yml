name: Terraform CI/CD

# NOTE: Auto-apply on push to main is intentional for tenant-001
# active development phase. Branch protection and PR approval gates
# will be introduced at tenant-002 onboarding.
# See ADR-003 for the governance decision record.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: 1.14.8
  AWS_REGION: us-east-2
  WORKING_DIR: terraform

jobs:
  terraform:
    name: Terraform Plan and Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda functions
        working-directory: .
        run: |
          cd lambda/intake-handler
          zip -r intake-handler.zip index.py
          cd ../content-generator
          zip -r content-generator.zip index.py
          cd ../watchlist-fetcher
          zip -r watchlist-fetcher.zip index.py

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="tenant_001_email=${{ secrets.TENANT_001_EMAIL }}" -var="proxycurl_api_key=${{ secrets.PROXYCURL_API_KEY }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -var="tenant_001_email=${{ secrets.TENANT_001_EMAIL }}" -var="proxycurl_api_key=${{ secrets.PROXYCURL_API_KEY }}"