<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Coaching Discovery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1410;
    --cream: #f7f3ee;
    --warm: #e8dfd4;
    --gold: #b8956a;
    --gold-light: #d4b48a;
    --muted: #7a6e65;
    --border: #d9d0c7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 60px 24px;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease both;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 20px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .intro {
    font-size: 15px;
    line-height: 1.7;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 28px auto;
  }

  .form-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 20px;
    animation: fadeUp 0.8s ease both;
  }

  .card-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 8px;
    display: block;
  }

  .card-question {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .card-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.12);
    background: white;
  }

  textarea::placeholder { color: #b5aca3; }

  .scale-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .scale-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .scale-label input[type="radio"] { display: none; }

  .scale-btn {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--muted);
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .scale-label input:checked + .scale-btn {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }

  .scale-label:hover .scale-btn {
    border-color: var(--gold-light);
    color: var(--gold);
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  .linkedin-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .linkedin-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.12);
    background: white;
  }

  .linkedin-input::placeholder { color: #b5aca3; }

  .submit-wrap {
    text-align: center;
    margin-top: 40px;
  }

  .submit-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 16px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: var(--gold); }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    line-height: 1.6;
  }

  .success {
    display: none;
    text-align: center;
    padding: 60px 40px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .success-icon {
    width: 48px;
    height: 48px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .success-icon svg {
    width: 22px;
    height: 22px;
    stroke: white;
    fill: none;
    stroke-width: 2;
  }

  .success h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 12px;
  }

  .success p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .form-card { padding: 28px 24px; }
    .scale-btn { width: 36px; height: 36px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <p class="eyebrow">Executive Coaching Platform</p>
    <h1>Tell me about<br><em>your work</em></h1>
    <div class="divider"></div>
    <p class="intro">Five short questions to help us build an AI system that works the way you do and sounds like you.</p>
  </div>

  <form id="discoveryForm">

    <div class="form-card">

      <p class="card-question">Who is your best current client, and how did they find
